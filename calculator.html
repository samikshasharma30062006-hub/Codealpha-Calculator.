<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:linear-gradient(#00f5ff,#8a2be2);
    border-radius:50%;
    filter:blur(140px);
    opacity:0.4;
    top:-150px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:linear-gradient(#ff00c8,#ffb703);
    border-radius:50%;
    filter:blur(140px);
    opacity:0.3;
    bottom:-180px;
    right:-120px;
}

.calculator{
    position:relative;
    width:360px;
    padding:30px;
    border-radius:30px;
    background:rgba(15,23,42,0.75);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(0,255,255,0.15);
    z-index:1;
}

.title{
    text-align:center;
    color:#fff;
    font-size:30px;
    font-weight:700;
    margin-bottom:25px;
    letter-spacing:2px;
    text-shadow:0 0 10px #00f5ff;
}

#display{
    width:100%;
    height:85px;
    border:none;
    outline:none;
    border-radius:20px;
    margin-bottom:25px;
    padding:20px;
    text-align:right;
    font-size:35px;
    background:#0f172a;
    color:#00f5ff;
    box-shadow:
      inset 0 0 12px rgba(0,255,255,0.2),
      0 0 12px rgba(0,255,255,0.1);
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
}

button{
    height:68px;
    border:none;
    border-radius:18px;
    font-size:22px;
    color:white;
    cursor:pointer;
    background:#111827;
    transition:0.25s ease;
    box-shadow:
      0 0 10px rgba(255,255,255,0.05),
      inset 0 0 5px rgba(255,255,255,0.03);
}

button:hover{
    transform:translateY(-4px);
    box-shadow:0 0 18px rgba(0,245,255,0.4);
}

button:active{
    transform:scale(0.95);
}

.operator{
    background:linear-gradient(135deg,#ff00c8,#8a2be2);
}

.equal{
    background:linear-gradient(135deg,#00f5ff,#00c853);
    color:#000;
    font-weight:bold;
}

.clear{
    background:linear-gradient(135deg,#ff512f,#dd2476);
}

.zero{
    grid-column:span 2;
}

@media(max-width:400px){
    .calculator{
        width:92%;
        padding:22px;
    }

    button{
        height:60px;
    }
}
</style>
</head>
<body>

<div class="calculator">
    <div class="title">Calculator</div>

    <input type="text" id="display" placeholder="0" disabled>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="deleteLast()" class="operator">⌫</button>
        <button onclick="appendValue('%')" class="operator">%</button>
        <button onclick="appendValue('/')" class="operator">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('*')" class="operator">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('-')" class="operator">−</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')" class="operator">+</button>

        <button onclick="appendValue('0')" class="zero">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<script>
const display = document.getElementById('display');

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = '';
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = 'Error';
    }
}

document.addEventListener('keydown',(event)=>{
    const key = event.key;

    if(!isNaN(key) || ['+','-','*','/','.','%'].includes(key)){
        appendValue(key);
    }
    else if(key === 'Enter'){
        calculate();
    }
    else if(key === 'Backspace'){
        deleteLast();
    }
    else if(key === 'Escape'){
        clearDisplay();
    }
});
</script>

</body>
</html>
